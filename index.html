<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <!-- Menghubungkan file CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Tombol Dark Mode Baru -->
        <button id="btn-theme" class="theme-btn">🌙 Ganti Tema</button>

        <!-- 1. Greeting Section -->
        <header class="greeting-section">
            <h1 id="time-display">00:00:00</h1>
            <p id="date-display">Date</p>
            <h2 id="greeting-message">Good Morning</h2>
        </header>

        <div class="main-content">
            <!-- 2. Focus Timer Section -->
            <section class="card timer-section">
                <h3>Focus Timer</h3>
                <div id="timer-display" class="timer-text">25:00</div>
                <div class="timer-controls">
                    <button id="btn-start">Start</button>
                    <button id="btn-stop">Stop</button>
                    <button id="btn-reset">Reset</button>
                </div>
            </section>

            <!-- 3. To-Do List Section -->
            <section class="card todo-section">
                <h3>Tasks</h3>
                <div class="input-group">
                    <input type="text" id="task-input" placeholder="Add a new task...">
                    <button id="btn-add-task">Add</button>
                </div>
                <ul id="task-list">
                    <!-- Daftar tugas akan muncul di sini via JavaScript -->
                </ul>
            </section>

            <!-- 4. Quick Links Section -->
            <section class="card links-section">
                <h3>Quick Links</h3>
                <div class="input-group">
                    <input type="text" id="link-name" placeholder="Link name">
                    <input type="url" id="link-url" placeholder="URL (https://...)">
                    <button id="btn-add-link">Add Link</button>
                </div>
                <div id="links-container" class="links-grid">
                    <!-- Tombol link akan muncul di sini via JavaScript -->
                </div>
            </section>
        </div>
    </div>

    <!-- Menghubungkan file JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
